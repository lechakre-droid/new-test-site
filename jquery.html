<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>jQuery Bakery </title>

  
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      transition: 0.3s;
    }

    
    .dark {
      background-color: #222;
      color: white;
    }

    #box {
      width: 150px;
      height: 150px;
      background-color: coral;
      margin-top: 15px;
    }

    button {
      margin: 5px;
      padding: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>jQuery Exercises</h1>

  
  <button id="darkModeBtn">Toggle Dark Mode</button>

  <hr>

  
  <button id="addItem">Add List Item</button>
  <ul id="list"></ul>

  <hr>


  <button id="fadeBtn">Fade Box</button>
  <div id="box"></div>

  <script>
    $(document).ready(function() {

      
      $("#darkModeBtn").click(function() {
        $("body").toggleClass("dark");
      });

    
      let counter = 1;

      $("#addItem").click(function() {
        $("#list").append("<li>Item " + counter + "</li>");
        counter++;
      });

     
      $("#fadeBtn").click(function() {
        $("#box").fadeToggle();
      });

    });
  </script>

</body>
</html>
